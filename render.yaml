services:
  - type: web
    name: aegis-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
