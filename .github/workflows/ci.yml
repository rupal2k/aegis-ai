name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: SAST — Bandit static analysis
        run: bandit -r ingestion ml_engine dashboard -ll -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Dependency CVE scan — pip-audit
        run: pip-audit -r requirements.docker.txt --format json -o pip-audit-report.json

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  test:
    runs-on: ubuntu-latest
    needs: security

    env:
      DATABASE_URL: postgresql://aegis_ci:aegis_ci_pass@localhost:5432/aegis_test
      HASH_SALT: ${{ secrets.HASH_SALT || 'ci_hash_salt_placeholder' }}
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci_secret_key_placeholder_32chars_x' }}
      AEGIS_USERS_JSON: ${{ secrets.AEGIS_USERS_JSON }}
      MLFLOW_TRACKING_URI: file:./mlruns

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aegis_ci
          POSTGRES_PASSWORD: aegis_ci_pass
          POSTGRES_DB: aegis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.docker.txt

      - name: Generate synthetic data
        run: python data/generate.py

      - name: Load data into Postgres
        run: python data/load_to_db.py

      - name: Run data & normalizer tests
        run: python -m pytest tests/test_data.py tests/test_normalizer.py -v

      - name: Train model (abbreviated for CI)
        env:
          AEGIS_CI_FAST: "1"
        run: python -m ml_engine.training.train --no-hf

      - name: Run ML engine tests
        run: python -m pytest tests/test_ml_engine.py -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          file: ./nginx/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
