name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: aegis_user
          POSTGRES_PASSWORD: aegis_pass
          POSTGRES_DB: aegis_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.docker.txt

      - name: Set up environment
        run: |
          echo "DATABASE_URL=postgresql://aegis_user:aegis_pass@localhost:5432/aegis_db" >> $GITHUB_ENV
          echo "HASH_SALT=ci_test_salt" >> $GITHUB_ENV
          echo "SECRET_KEY=ci_test_secret" >> $GITHUB_ENV

      - name: Generate synthetic data
        run: python data/generate.py

      - name: Load data into Postgres
        run: python data/load_to_db.py

      - name: Run data & normalizer tests
        run: python -m pytest tests/test_data.py tests/test_normalizer.py -v

      - name: Train model (abbreviated for CI)
        env:
          AEGIS_CI_FAST: "1"
        run: python -m ml_engine.training.train

      - name: Run ML engine tests
        run: python -m pytest tests/test_ml_engine.py -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.dashboard
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
