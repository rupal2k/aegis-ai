version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: aegis_user
      POSTGRES_PASSWORD: aegis_pass
      POSTGRES_DB: aegis_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  pgdata: